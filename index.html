<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payub School — ระบบจัดการการเรียนการสอน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #1a5f3f; --primary-light: #2d8a5e; --primary-dark: #0d3d28;
    --accent: #f0a500; --accent-light: #ffc233;
    --bg: #f5f7f5; --surface: #ffffff; --surface2: #eef2ee;
    --text: #1a2e1a; --text-muted: #5a7a5a; --border: #d0e0d0;
    --danger: #c0392b; --success: #27ae60;
    --shadow: 0 4px 24px rgba(26,95,63,0.10);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ===== AUTH ===== */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
    position: relative; overflow: hidden;
  }
  .auth-card {
    background: var(--surface); border-radius: 24px; padding: 48px 40px;
    width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    position: relative; z-index: 1; animation: slideUp 0.5s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform: translateY(0); } }
  .auth-logo { text-align: center; margin-bottom: 32px; }
  .auth-logo .logo-icon { font-size: 36px; margin-bottom: 16px; }
  .auth-logo h1 { font-family: 'Noto Serif Thai', serif; font-size: 22px; font-weight: 700; color: var(--primary-dark); }
  
  .auth-tabs { display: flex; background: var(--surface2); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
  .auth-tab { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 10px; cursor: pointer; color: var(--text-muted); }
  .auth-tab.active { background: var(--surface); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 13px 16px; border: 2px solid var(--border); border-radius: 12px;
    font-family: 'Sarabun', sans-serif; font-size: 15px; outline: none;
  }
  
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 13px 24px; border: none; border-radius: 12px; font-family: 'Sarabun', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; }
  .btn-secondary { background: var(--surface2); color: var(--primary); border: 2px solid var(--border); }
  .btn-accent { background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: white; }
  .btn-sm { padding: 8px 16px; font-size: 13px; width: auto; }

  .alert { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 16px; display: none; }
  .alert-error { background: #fdecea; color: var(--danger); border: 1px solid #f5c6c2; }
  .alert-success { background: #eafaf1; color: var(--success); border: 1px solid #a9dfbf; }
  .alert.show { display: block; }

  /* ===== APP ===== */
  #app-screen { display: none; }
  .app-layout { display: flex; min-height: 100vh; }
  .sidebar { width: 260px; background: linear-gradient(180deg, var(--primary-dark) 0%, var(--primary) 100%); color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
  .sidebar-header { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 10px; cursor: pointer; margin-bottom: 2px; opacity: 0.8; }
  .nav-item.active { background: rgba(255,255,255,0.15); opacity: 1; }
  .main-content { margin-left: 260px; flex: 1; padding: 28px 32px; }
  .page { display: none; } .page.active { display: block; }
  .card { background: var(--surface); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
  
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border-radius: 20px; padding: 32px; width: 100%; max-width: 480px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-success { background: #eafaf1; color: var(--success); }
  .badge-danger { background: #fdecea; color: var(--danger); }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🏫</div>
      <h1>Payub School</h1>
      <p>ระบบจัดการการเรียนการสอน</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">เข้าสู่ระบบ</button>
      <button class="auth-tab" onclick="switchTab('register')">สมัครสมาชิก</button>
    </div>

    <div id="alert-auth" class="alert"></div>

    <div id="login-form">
      <div class="form-group"><label>อีเมล</label><input type="email" id="login-email" placeholder="กรอกอีเมล"></div>
      <div class="form-group"><label>รหัสผ่าน</label><input type="password" id="login-password" placeholder="กรอกรหัสผ่าน"></div>
      <button class="btn btn-primary" onclick="login()">🔐 เข้าสู่ระบบ</button>
    </div>

    <div id="register-form" style="display:none">
      <div class="form-group"><label>ชื่อ-นามสกุล</label><input type="text" id="reg-name" placeholder="กรอกชื่อ-นามสกุล"></div>
      <div class="form-group"><label>อีเมล</label><input type="email" id="reg-email" placeholder="กรอกอีเมล"></div>
      <div class="form-group"><label>รหัสผ่าน</label><input type="password" id="reg-password" placeholder="อย่างน้อย 6 ตัวอักษร"></div>
      <div class="form-group"><label>สมัครในฐานะ</label>
        <select id="reg-role"><option value="student">นักเรียน</option><option value="teacher">ครู</option></select>
      </div>
      <button class="btn btn-primary" onclick="register()">✨ สมัครสมาชิก</button>
    </div>
  </div>
</div>

<div id="app-screen">
  <div class="app-layout">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div style="font-size:18px; font-weight:bold;">🏫 Payub School</div>
        <div id="sidebar-username" style="font-size:13px; opacity:0.8; margin-top:5px;">กำลังโหลด...</div>
      </div>
      <div class="sidebar-nav" id="sidebar-nav"></div>
      <div style="padding: 16px;"><button class="btn btn-secondary" onclick="logout()">🚪 ออกจากระบบ</button></div>
    </nav>

    <div class="main-content">
      <div class="page active" id="page-dashboard"><h2>📊 แดชบอร์ด</h2><p>ยินดีต้อนรับเข้าสู่ระบบ!</p></div>
      <div class="page" id="page-subjects"><h2>📚 วิชาเรียน</h2><button class="btn btn-primary btn-sm" id="btn-add-subject" onclick="openModal('modal-subject')" style="display:none">+ เพิ่มวิชา</button><div id="subjects-list" style="margin-top:20px;">กำลังโหลด...</div></div>
      <div class="page" id="page-assignments"><h2>📝 งานที่มอบหมาย</h2><button class="btn btn-primary btn-sm" id="btn-add-assignment" onclick="openAddAssignment()" style="display:none">+ มอบหมายงาน</button><div id="assignments-list" style="margin-top:20px;">กำลังโหลด...</div></div>
      <div class="page" id="page-submissions"><h2>📤 การส่งงาน / ตรวจงาน</h2><div id="submissions-list" style="margin-top:20px;">กำลังโหลด...</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-subject">
  <div class="modal">
    <h3>📚 เพิ่มวิชาใหม่</h3>
    <div class="form-group" style="margin-top:15px;"><label>ชื่อวิชา</label><input type="text" id="subject-name"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-subject')">ยกเลิก</button>
      <button class="btn btn-primary" onclick="addSubject()">บันทึก</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-assignment">
  <div class="modal">
    <h3>📝 มอบหมายงานใหม่</h3>
    <div class="form-group" style="margin-top:15px;"><label>วิชา</label><select id="assignment-subject"></select></div>
    <div class="form-group"><label>ชื่องาน</label><input type="text" id="assignment-title"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-assignment')">ยกเลิก</button>
      <button class="btn btn-primary" onclick="addAssignment()">บันทึก</button>
    </div>
  </div>
</div>

<script>
// ===== SETUP SUPABASE =====
const SUPABASE_URL = 'https://hbpqbkgqckawqjcbqemh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ES5K5aB28I9NkTt-6ddPUA_4NfZ3aJd';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;

// ===== CUSTOM AUTH LOGIC =====
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-form').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab==='register' ? 'block' : 'none';
  clearAlert('alert-auth');
}
function showAlert(id, msg, type='error') { const el = document.getElementById(id); el.className = `alert alert-${type} show`; el.textContent = msg; }
function clearAlert(id) { document.getElementById(id).className = 'alert'; document.getElementById(id).textContent = ''; }

window.onload = async () => {
  const savedUserId = localStorage.getItem('payub_user_id');
  if (savedUserId) {
    const { data } = await sb.from('profiles').select('*').eq('id', savedUserId).single();
    if (data) { currentUser = { id: data.id }; currentProfile = data; initApp(); }
  }
};

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  if (!email || !pass) return showAlert('alert-auth', 'กรุณากรอกข้อมูลให้ครบ');
  
  const { data, error } = await sb.from('profiles').select('*').eq('email', email).eq('password', pass).single();
  if (error || !data) return showAlert('alert-auth', 'อีเมลหรือรหัสผ่านไม่ถูกต้อง');

  currentUser = { id: data.id }; currentProfile = data;
  localStorage.setItem('payub_user_id', data.id);
  initApp();
}

async function register() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-password').value;
  const role = document.getElementById('reg-role').value;

  if (!name || !email || !pass) return showAlert('alert-auth', 'กรุณากรอกข้อมูลให้ครบ');
  
  const { data: existing } = await sb.from('profiles').select('id').eq('email', email).maybeSingle();
  if (existing) return showAlert('alert-auth', 'อีเมลนี้มีในระบบแล้ว');

  const { error } = await sb.from('profiles').insert([{ full_name: name, email: email, password: pass, role: role }]);
  if (error) return showAlert('alert-auth', error.message);
  
  showAlert('alert-auth', 'สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ', 'success');
  switchTab('login');
}

async function logout() {
  localStorage.removeItem('payub_user_id');
  document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('app-screen').style.display = 'none';
  currentUser = null; currentProfile = null;
}

// ===== APP LOGIC =====
function initApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('sidebar-username').textContent = currentProfile.full_name + (currentProfile.role==='teacher'?' (ครู)':' (นักเรียน)');
  
  const isTeacher = currentProfile.role === 'teacher';
  const nav = [
    { icon: '📊', label: 'แดชบอร์ด', page: 'dashboard' },
    { icon: '📚', label: 'วิชาเรียน', page: 'subjects' },
    { icon: '📝', label: 'งาน', page: 'assignments' },
    { icon: '📤', label: 'ส่งงาน/ตรวจงาน', page: 'submissions' }
  ];

  document.getElementById('sidebar-nav').innerHTML = nav.map(n => `
    <div class="nav-item ${n.page==='dashboard'?'active':''}" onclick="navigate('${n.page}')">
      <span>${n.icon}</span> ${n.label}
    </div>
  `).join('');

  if (isTeacher) {
    document.getElementById('btn-add-subject').style.display = 'inline-block';
    document.getElementById('btn-add-assignment').style.display = 'inline-block';
  }
  loadSubjects(); loadAssignments(); loadSubmissions();
}

function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  event.currentTarget.classList.add('active');
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

async function loadSubjects() {
  const { data } = await sb.from('subjects').select('*');
  document.getElementById('subjects-list').innerHTML = data?.length ? data.map(s => `<div class="card"><b>${s.name}</b></div>`).join('') : 'ยังไม่มีวิชา';
}
async function addSubject() {
  const name = document.getElementById('subject-name').value;
  await sb.from('subjects').insert({ name, teacher_id: currentUser.id });
  closeModal('modal-subject'); loadSubjects();
}

async function loadAssignments() {
  const { data } = await sb.from('assignments').select('*, subjects(name)');
  document.getElementById('assignments-list').innerHTML = data?.length ? data.map(a => `<div class="card"><b>${a.title}</b> (วิชา: ${a.subjects?.name})</div>`).join('') : 'ยังไม่มีงาน';
}
async function openAddAssignment() {
  const { data } = await sb.from('subjects').select('*').eq('teacher_id', currentUser.id);
  document.getElementById('assignment-subject').innerHTML = data?.map(s => `<option value="${s.id}">${s.name}</option>`).join('') || '';
  openModal('modal-assignment');
}
async function addAssignment() {
  const title = document.getElementById('assignment-title').value;
  const subject_id = document.getElementById('assignment-subject').value;
  await sb.from('assignments').insert({ title, subject_id });
  closeModal('modal-assignment'); loadAssignments();
}

async function loadSubmissions() {
  const { data } = await sb.from('submissions').select('*, assignments(title), profiles(full_name)');
  document.getElementById('submissions-list').innerHTML = data?.length ? data.map(s => `<div class="card">ผู้ส่ง: ${s.profiles?.full_name} | งาน: ${s.assignments?.title} | คะแนน: ${s.score||'รอตรวจ'}</div>`).join('') : 'ยังไม่มีการส่งงาน';
}
</script>
</body>
</html>
