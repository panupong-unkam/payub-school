<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payub School — ระบบจัดการการเรียนการสอน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --primary: #1a5f3f; --primary-light: #2d8a5e; --primary-dark: #0d3d28;
    --accent: #f0a500; --accent-light: #ffc233;
    --bg: #f5f7f5; --surface: #ffffff; --surface2: #eef2ee;
    --text: #1a2e1a; --text-muted: #5a7a5a; --border: #d0e0d0;
    --danger: #c0392b; --success: #27ae60;
    --shadow: 0 4px 24px rgba(26,95,63,0.10);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* ===== อนิเมชันพื้นฐาน ===== */
  @keyframes slideUp { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  
  /* ===== AUTH ===== */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
    position: relative; overflow: hidden;
  }
  .auth-card {
    background: var(--surface); border-radius: 24px; padding: 48px 40px;
    width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    position: relative; z-index: 1; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .auth-logo { text-align: center; margin-bottom: 32px; transition: transform 0.3s; }
  .auth-logo:hover { transform: scale(1.05); } /* ลูกเล่นเมื่อเอาเมาส์ชี้โลโก้ */
  .auth-logo .logo-icon { font-size: 42px; margin-bottom: 16px; animation: slideUp 0.8s; }
  .auth-logo h1 { font-family: 'Noto Serif Thai', serif; font-size: 22px; font-weight: 700; color: var(--primary-dark); }
  
  .auth-tabs { display: flex; background: var(--surface2); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
  .auth-tab { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 10px; cursor: pointer; color: var(--text-muted); transition: all 0.3s; }
  .auth-tab.active { background: var(--surface); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); transform: scale(1.02); }

  .form-group { margin-bottom: 18px; animation: fadeIn 0.5s; }
  .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .form-group input, .form-group select {
    width: 100%; padding: 13px 16px; border: 2px solid var(--border); border-radius: 12px;
    font-family: 'Sarabun', sans-serif; font-size: 15px; outline: none; transition: border-color 0.3s, box-shadow 0.3s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary-light); box-shadow: 0 0 0 4px rgba(45,138,94,0.1); }
  
  /* ปุ่มกดมี Effect */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 13px 24px; border: none; border-radius: 12px; font-family: 'Sarabun', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: 0 4px 15px rgba(26,95,63,0.3); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,95,63,0.4); }
  .btn-primary:active { transform: translateY(1px); box-shadow: 0 2px 10px rgba(26,95,63,0.3); } /* เวลากดปุ่มจะยุบลงไป */
  .btn-secondary { background: var(--surface2); color: var(--primary); border: 2px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-sm { padding: 8px 16px; font-size: 13px; width: auto; }

  /* ===== ระบบแจ้งเตือน (Toast) ===== */
  #toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; }
  .toast {
    background: var(--surface); color: var(--text); padding: 16px 24px; border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 12px;
    transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    border-left: 6px solid var(--primary); font-weight: 600; min-width: 250px;
  }
  .toast.show { transform: translateX(0); }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
  .toast.info { border-color: var(--accent); }

  /* ===== APP ===== */
  #app-screen { display: none; }
  .app-layout { display: flex; min-height: 100vh; }
  .sidebar { width: 260px; background: linear-gradient(180deg, var(--primary-dark) 0%, var(--primary) 100%); color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; transition: transform 0.3s; }
  .sidebar-header { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 10px; cursor: pointer; margin-bottom: 2px; opacity: 0.8; transition: all 0.3s; }
  .nav-item:hover { opacity: 1; background: rgba(255,255,255,0.1); transform: translateX(5px); } /* เลื่อนเมนูเมื่อเอาเมาส์ชี้ */
  .nav-item.active { background: rgba(255,255,255,0.15); opacity: 1; border-left: 4px solid var(--accent); }
  
  .main-content { margin-left: 260px; flex: 1; padding: 28px 32px; background: var(--bg); }
  .page { display: none; animation: slideUp 0.4s ease; } /* หน้าเว็บเลื่อนขึ้นมานุ่มๆ */
  .page.active { display: block; }
  
  /* การ์ดข้อมูลมี Effect เด้งดึ๋ง */
  .card { background: var(--surface); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; transition: transform 0.3s, box-shadow 0.3s; border: 1px solid var(--border); }
  .card:hover { transform: translateY(-5px); box-shadow: 0 12px 32px rgba(26,95,63,0.15); }
  
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border-radius: 20px; padding: 32px; width: 100%; max-width: 480px; animation: slideUp 0.3s ease; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
</style>
</head>
<body>

<div id="toast-container"></div>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🏫</div>
      <h1>Payub School</h1>
      <p>ยินดีต้อนรับเข้าสู่ระบบ</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">เข้าสู่ระบบ</button>
      <button class="auth-tab" onclick="switchTab('register')">สมัครสมาชิก</button>
    </div>

    <div id="login-form">
      <div class="form-group"><label>อีเมล</label><input type="email" id="login-email" placeholder="กรอกอีเมล"></div>
      <div class="form-group"><label>รหัสผ่าน</label><input type="password" id="login-password" placeholder="กรอกรหัสผ่าน"></div>
      <button class="btn btn-primary" onclick="login()">✨ เข้าสู่ระบบ</button>
    </div>

    <div id="register-form" style="display:none">
      <div class="form-group"><label>ชื่อ-นามสกุล</label><input type="text" id="reg-name" placeholder="กรอกชื่อ-นามสกุลจริง"></div>
      <div class="form-group"><label>อีเมล</label><input type="email" id="reg-email" placeholder="กรอกอีเมล"></div>
      <div class="form-group"><label>รหัสผ่าน</label><input type="password" id="reg-password" placeholder="ตั้งรหัสผ่านที่จำง่าย (อย่างน้อย 6 ตัว)"></div>
      <div class="form-group"><label>สมัครในฐานะ</label>
        <select id="reg-role"><option value="student">👨‍🎓 นักเรียน</option><option value="teacher">👩‍🏫 ครู</option></select>
      </div>
      <button class="btn btn-primary" onclick="register()">📝 ยืนยันการสมัคร</button>
    </div>
  </div>
</div>

<div id="app-screen">
  <div class="app-layout">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div style="font-size:18px; font-weight:bold;">🏫 Payub School</div>
        <div id="sidebar-username" style="font-size:13px; opacity:0.8; margin-top:5px;">กำลังโหลด...</div>
      </div>
      <div class="sidebar-nav" id="sidebar-nav"></div>
      <div style="padding: 16px;"><button class="btn btn-secondary" onclick="logout()" style="color:white; border-color:rgba(255,255,255,0.3); background:rgba(255,255,255,0.1);">🚪 ออกจากระบบ</button></div>
    </nav>

    <div class="main-content">
      <div class="page active" id="page-dashboard">
        <h2>📊 แดชบอร์ด</h2>
        <div class="card" style="margin-top:20px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white;">
          <h3 id="welcome-text">ยินดีต้อนรับเข้าสู่ระบบ!</h3>
          <p style="opacity: 0.8; margin-top: 5px;">พร้อมที่จะเรียนรู้สิ่งใหม่ๆ หรือยัง?</p>
        </div>
      </div>
      <div class="page" id="page-subjects"><h2>📚 วิชาเรียน</h2><button class="btn btn-primary btn-sm" id="btn-add-subject" onclick="openModal('modal-subject')" style="display:none; margin-top:10px;">+ เพิ่มวิชาใหม่</button><div id="subjects-list" style="margin-top:20px;">กำลังโหลด...</div></div>
      <div class="page" id="page-assignments"><h2>📝 งานที่มอบหมาย</h2><button class="btn btn-primary btn-sm" id="btn-add-assignment" onclick="openAddAssignment()" style="display:none; margin-top:10px;">+ มอบหมายงาน</button><div id="assignments-list" style="margin-top:20px;">กำลังโหลด...</div></div>
      <div class="page" id="page-submissions"><h2>📤 ส่งงาน / ตรวจงาน</h2><div id="submissions-list" style="margin-top:20px;">กำลังโหลด...</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-subject">
  <div class="modal">
    <h3>📚 เพิ่มวิชาใหม่</h3>
    <div class="form-group" style="margin-top:15px;"><label>ชื่อวิชา</label><input type="text" id="subject-name" placeholder="เช่น วิทยาการคำนวณ ม.1"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-subject')">ยกเลิก</button>
      <button class="btn btn-primary" onclick="addSubject()">💾 บันทึก</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-assignment">
  <div class="modal">
    <h3>📝 มอบหมายงานใหม่</h3>
    <div class="form-group" style="margin-top:15px;"><label>วิชา</label><select id="assignment-subject"></select></div>
    <div class="form-group"><label>ชื่องาน</label><input type="text" id="assignment-title" placeholder="เช่น ส่งใบงานที่ 1"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-assignment')">ยกเลิก</button>
      <button class="btn btn-primary" onclick="addAssignment()">💾 บันทึก</button>
    </div>
  </div>
</div>

<script>
// ===== SETUP SUPABASE =====
const SUPABASE_URL = 'https://hbpqbkgqckawqjcbqemh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ES5K5aB28I9NkTt-6ddPUA_4NfZ3aJd';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;

// ===== ระบบแสดงแจ้งเตือน (TOAST) =====
function showToast(message, type = 'success') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  
  let icon = '✅';
  if(type === 'error') icon = '❌';
  if(type === 'info') icon = '💡';

  toast.innerHTML = `<span style="font-size:20px;">${icon}</span> <span>${message}</span>`;
  container.appendChild(toast);

  // ทำให้เลื่อนเข้ามา
  requestAnimationFrame(() => {
    toast.classList.add('show');
  });

  // ลบออกอัตโนมัติเมื่อผ่านไป 3 วินาที
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 400);
  }, 3000);
}

// ===== AUTH LOGIC =====
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-form').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab==='register' ? 'block' : 'none';
}

window.onload = async () => {
  const savedUserId = localStorage.getItem('payub_user_id');
  if (savedUserId) {
    const { data } = await sb.from('profiles').select('*').eq('id', savedUserId).single();
    if (data) { currentUser = { id: data.id }; currentProfile = data; initApp(false); }
  }
};

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  if (!email || !pass) return showToast('กรุณากรอกอีเมลและรหัสผ่านให้ครบ', 'error');
  
  const { data, error } = await sb.from('profiles').select('*').eq('email', email).eq('password', pass).single();
  if (error || !data) return showToast('อีเมลหรือรหัสผ่านไม่ถูกต้อง', 'error');

  currentUser = { id: data.id }; currentProfile = data;
  localStorage.setItem('payub_user_id', data.id);
  
  showToast(`เข้าสู่ระบบสำเร็จ! สวัสดี ${data.full_name}`, 'success');
  initApp(true); // true = ให้ยิงพลุ
}

async function register() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-password').value;
  const role = document.getElementById('reg-role').value;

  if (!name || !email || !pass) return showToast('กรุณากรอกข้อมูลให้ครบทุกช่อง', 'error');
  if (pass.length < 6) return showToast('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'error');
  
  const { data: existing } = await sb.from('profiles').select('id').eq('email', email).maybeSingle();
  if (existing) return showToast('อีเมลนี้มีคนใช้งานแล้ว', 'error');

  const { error } = await sb.from('profiles').insert([{ full_name: name, email: email, password: pass, role: role }]);
  if (error) return showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
  
  showToast('สมัครสมาชิกสำเร็จ! กรุณาล็อกอิน', 'success');
  switchTab('login');
  document.getElementById('login-email').value = email; // เติมให้อัตโนมัติ
}

async function logout() {
  localStorage.removeItem('payub_user_id');
  document.getElementById('auth-screen').style.display = 'flex'; 
  document.getElementById('app-screen').style.display = 'none';
  currentUser = null; currentProfile = null;
  document.getElementById('login-password').value = '';
  showToast('ออกจากระบบเรียบร้อยแล้ว', 'info');
}

// ===== APP LOGIC =====
function initApp(triggerConfetti = false) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  
  let roleIcon = currentProfile.role === 'teacher' ? '👩‍🏫 ครู' : '👨‍🎓 นักเรียน';
  document.getElementById('sidebar-username').innerHTML = `${currentProfile.full_name} <br><span style="color:var(--accent-light)">${roleIcon}</span>`;
  document.getElementById('welcome-text').textContent = `สวัสดีครับ, ${currentProfile.full_name}! 👋`;

  // ลูกเล่นยิงพลุกระดาษฉลองการล็อกอิน
  if (triggerConfetti) {
    confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#1a5f3f', '#f0a500', '#ffffff'] });
  }
  
  const isTeacher = currentProfile.role === 'teacher';
  const nav = [
    { icon: '📊', label: 'แดชบอร์ด', page: 'dashboard' },
    { icon: '📚', label: 'วิชาเรียน', page: 'subjects' },
    { icon: '📝', label: 'งานมอบหมาย', page: 'assignments' },
    { icon: '📤', label: isTeacher ? 'ตรวจงาน' : 'ส่งงาน', page: 'submissions' }
  ];

  document.getElementById('sidebar-nav').innerHTML = nav.map(n => `
    <div class="nav-item ${n.page==='dashboard'?'active':''}" onclick="navigate('${n.page}', this)">
      <span style="font-size:20px">${n.icon}</span> <span>${n.label}</span>
    </div>
  `).join('');

  if (isTeacher) {
    document.getElementById('btn-add-subject').style.display = 'inline-block';
    document.getElementById('btn-add-assignment').style.display = 'inline-block';
  } else {
    document.getElementById('btn-add-subject').style.display = 'none';
    document.getElementById('btn-add-assignment').style.display = 'none';
  }
  
  loadSubjects(); loadAssignments(); loadSubmissions();
}

function navigate(page, element) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if(element) element.classList.add('active');
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

async function loadSubjects() {
  const { data } = await sb.from('subjects').select('*');
  document.getElementById('subjects-list').innerHTML = data?.length ? data.map(s => `<div class="card"><b>${s.name}</b></div>`).join('') : '<div style="opacity:0.5; text-align:center; padding: 20px;">ยังไม่มีวิชาเรียน</div>';
}
async function addSubject() {
  const name = document.getElementById('subject-name').value.trim();
  if(!name) return showToast('กรุณากรอกชื่อวิชา', 'error');
  await sb.from('subjects').insert({ name, teacher_id: currentUser.id });
  showToast('เพิ่มวิชาใหม่เรียบร้อย', 'success');
  closeModal('modal-subject'); loadSubjects();
  document.getElementById('subject-name').value = '';
}

async function loadAssignments() {
  const { data } = await sb.from('assignments').select('*, subjects(name)');
  document.getElementById('assignments-list').innerHTML = data?.length ? data.map(a => `<div class="card"><b>${a.title}</b> <br><span style="font-size:13px; color:gray;">วิชา: ${a.subjects?.name}</span></div>`).join('') : '<div style="opacity:0.5; text-align:center; padding: 20px;">ยังไม่มีงานมอบหมาย</div>';
}
async function openAddAssignment() {
  const { data } = await sb.from('subjects').select('*').eq('teacher_id', currentUser.id);
  if(!data || data.length === 0) return showToast('คุณต้องสร้างวิชาก่อนมอบหมายงาน', 'error');
  document.getElementById('assignment-subject').innerHTML = data.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  openModal('modal-assignment');
}
async function addAssignment() {
  const title = document.getElementById('assignment-title').value.trim();
  const subject_id = document.getElementById('assignment-subject').value;
  if(!title) return showToast('กรุณากรอกชื่องาน', 'error');
  await sb.from('assignments').insert({ title, subject_id });
  showToast('มอบหมายงานสำเร็จ!', 'success');
  closeModal('modal-assignment'); loadAssignments();
  document.getElementById('assignment-title').value = '';
}

async function loadSubmissions() {
  document.getElementById('submissions-list').innerHTML = '<div style="opacity:0.5; text-align:center; padding: 20px;">กำลังโหลด...</div>';
}
</script>
</body>
</html>
