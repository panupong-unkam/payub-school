<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏠 ห้องรอเริ่ม — Python 3D Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../game-style.css">
<link rel="stylesheet" href="multiplayer.css">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/avatar-system.js"></script>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header class="game-topbar">
  <a href="lobby.html" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    ออกห้อง
  </a>
  <div class="topbar-title">
    <span class="topbar-emoji">🏠</span>
    <div>
      <div class="topbar-name">ห้องรอเริ่ม</div>
      <div class="topbar-sub" id="user-label">กำลังโหลด...</div>
    </div>
  </div>
  <a href="../avatar/index.html" class="back-btn">👕 แต่งตัว</a>
</header>

<main class="room-shell">
  <div class="room-header">
    <div class="room-code-display">
      <span id="room-code">------</span>
      <button class="room-copy-btn" onclick="copyCode()" title="คัดลอก">📋</button>
    </div>
    <div class="room-mode-pill" id="room-mode-pill">⏳ กำลังโหลด...</div>
  </div>

  <div class="players-row">
    <div class="player-card empty-slot" id="slot-1">
      <div class="empty-slot-icon">⏳</div>
      <div>ช่องผู้เล่นที่ 1</div>
    </div>
    <div class="vs-divider">VS</div>
    <div class="player-card empty-slot" id="slot-2">
      <div class="empty-slot-icon">⏳</div>
      <div>รอเพื่อนเข้าห้อง</div>
    </div>
  </div>

  <div class="room-actions">
    <button class="btn-hero btn-hero-ghost" id="btn-leave" onclick="leaveRoom()">
      🚪 ออกจากห้อง
    </button>
    <button class="btn-hero btn-hero-primary" id="btn-ready" onclick="toggleReady()">
      ✋ ฉันพร้อมแล้ว!
    </button>
  </div>
</main>

<div class="countdown-overlay" id="countdown-overlay">
  <div class="countdown-num" id="countdown-num">3</div>
</div>

<div class="toast" id="toast"></div>

<script src="room.js"></script>
</body>
</html>
