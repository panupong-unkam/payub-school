<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 ห้องเล่นออนไลน์ — Python 3D Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../game-style.css">
<link rel="stylesheet" href="multiplayer.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/levels-data.js"></script>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header class="game-topbar">
  <a href="../index.html" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    แผนที่
  </a>
  <div class="topbar-title">
    <span class="topbar-emoji">🎮</span>
    <div>
      <div class="topbar-name">เล่นออนไลน์ 2 คน</div>
      <div class="topbar-sub" id="user-label">กำลังโหลด...</div>
    </div>
  </div>
  <a href="../avatar/index.html" class="back-btn"
     onclick="this.href = '../avatar/index.html?return=' + encodeURIComponent(location.pathname + location.search)">👕 แต่งตัว</a>
</header>

<main class="lobby-shell">
  <div class="lobby-card lobby-create">
    <div class="lobby-icon">🚀</div>
    <h2>สร้างห้องใหม่</h2>
    <p>ตั้งห้องและส่ง code ให้เพื่อนเข้า</p>

    <div class="form-row">
      <label>เลือกด่าน</label>
      <select id="create-level">
        <!-- ตัวเลือกถูก populate ด้วย JS จาก PY3D.LEVELS -->
      </select>
    </div>

    <div class="form-row">
      <label>เลือกโหมด</label>
      <div class="mode-group">
        <button class="mode-btn active" data-mode="race">
          <div class="mode-emoji">🏁</div>
          <div class="mode-name">Race</div>
          <div class="mode-desc">เก็บครบ 3 เหรียญก่อนชนะ</div>
        </button>
        <button class="mode-btn" data-mode="golf">
          <div class="mode-emoji">🧠</div>
          <div class="mode-name">Code Golf</div>
          <div class="mode-desc">ใครเขียนสั้นกว่า + ถูกชนะ</div>
        </button>
      </div>
    </div>

    <button class="btn-hero btn-hero-primary big" onclick="createRoom()">
      ✨ สร้างห้อง
    </button>
  </div>

  <div class="lobby-divider"><span>หรือ</span></div>

  <div class="lobby-card lobby-join">
    <div class="lobby-icon">🔑</div>
    <h2>เข้าห้องของเพื่อน</h2>
    <p>กรอกรหัสห้อง 6 หลักที่เพื่อนส่งมา</p>

    <div class="code-input-wrap">
      <input type="text" id="join-code" maxlength="6" placeholder="ABCD12"
             oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
    </div>

    <button class="btn-hero btn-hero-ghost big" onclick="joinRoom()">
      🎯 เข้าห้อง
    </button>
  </div>
</main>

<!-- recent rooms history -->
<section class="recent-section" id="recent-section" style="display:none;">
  <h3>🕒 ห้องล่าสุดของคุณ</h3>
  <div class="recent-grid" id="recent-grid"></div>
</section>

<div class="toast" id="toast"></div>

<script src="lobby.js"></script>
</body>
</html>
