<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 3D Adventure — Level</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="game-style.css">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/supabase-client.js"></script>
<script src="shared/avatar-system.js"></script>
<script src="shared/levels-data.js"></script>
</head>
<body>

<header class="game-topbar">
  <a href="index.html" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    แผนที่
  </a>
  <div class="topbar-title">
    <span class="topbar-emoji" id="level-emoji">🌱</span>
    <div>
      <div class="topbar-name" id="level-name">ด่าน · กำลังโหลด</div>
      <div class="topbar-sub" id="level-sub">โลก · เริ่มต้น</div>
    </div>
  </div>
  <div class="player-stats">
    <div class="stat-pill"><span>🪙</span> <b id="coins-have">0</b>/<b id="coins-need">0</b></div>
    <div class="stat-pill"><span>📜</span> <b id="line-count">0</b> บรรทัด</div>
  </div>
</header>

<div class="brief-bar">
  <div>
    <div class="brief-title" id="brief-title">🎯 ภารกิจ</div>
    <div class="brief-sub" id="brief-sub">รายละเอียด</div>
  </div>
  <ul class="brief-objectives" id="brief-objectives"></ul>
</div>

<main class="level-shell">
  <section class="level-side">
    <div class="editor-wrap">
      <div class="editor-toolbar">
        <button class="tb-btn tb-run" onclick="runCode()">▶️ Run</button>
        <button class="tb-btn tb-reset" onclick="resetWorld()">🔄 Reset</button>
        <div class="tb-spacer"></div>
        <button class="tb-btn" onclick="showHint()">💡 Hint</button>
        <button class="tb-btn" onclick="showDocs()">📖 คำสั่ง</button>
      </div>
      <textarea id="code-editor" spellcheck="false"></textarea>
      <div class="console-wrap">
        <div class="console-head">
          <span>📟 Console</span>
          <span id="console-status">รอรันโค้ด...</span>
        </div>
        <div id="console-output">พิมพ์โค้ดแล้วกด <b>▶️ Run</b> เพื่อเริ่ม</div>
      </div>
    </div>
  </section>

  <section class="level-side">
    <div class="canvas-wrap">
      <canvas id="three-canvas"></canvas>
      <div class="robot-speech" id="robot-speech"></div>
      <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loading-text">กำลังโหลด Python runtime...</div>
      </div>
      <div class="hud">
        <div class="hud-pill">🤖 ตำแหน่ง: <b id="pos-text">(0,0)</b> หัน: <b id="dir-text">เหนือ</b></div>
        <div class="hud-pill">⏱️ ความเร็ว: <b>1x</b></div>
      </div>
      <div class="hud-bottom">
        <button class="cam-btn" onclick="cam.zoomIn()">➕</button>
        <button class="cam-btn" onclick="cam.zoomOut()">➖</button>
        <button class="cam-btn" onclick="cam.rotateL()">↺</button>
        <button class="cam-btn" onclick="cam.rotateR()">↻</button>
        <button class="cam-btn" onclick="cam.reset()">🎯</button>
      </div>
    </div>
  </section>
</main>

<div class="win-overlay" id="win-modal">
  <div class="win-card">
    <div class="win-emoji" id="win-emoji">🏆</div>
    <h2 id="win-title">ภารกิจสำเร็จ!</h2>
    <p id="win-desc">ผ่านด่านนี้แล้ว 🎉</p>
    <div class="win-rewards" id="win-rewards"></div>
    <div class="win-actions">
      <button class="btn-hero btn-hero-ghost" onclick="closeWin()">เล่นอีกครั้ง</button>
      <a href="#" id="win-next" class="btn-hero btn-hero-primary">▶️ ด่านถัดไป</a>
    </div>
  </div>
</div>

<script src="level-engine.js"></script>
</body>
</html>
